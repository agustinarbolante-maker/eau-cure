<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eau Cure - Water Station Delivery Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Eau Cure - Water Station Delivery Tracker</h1>
      <p>Track and manage all water deliveries</p>
    </header>

    <main class="main-content">
      <section class="form-section">
        <h2>New Delivery Entry</h2>
        <form id="deliveryForm">
          <div class="form-group">
            <label for="company">Company Delivered:</label>
            <select id="company" name="company" required>
              <option value="">-- Select a Company --</option>
            </select>
          </div>

          <div class="form-group">
            <label for="bottlesDelivered">Number of Bottles Delivered:</label>
            <input type="number" id="bottlesDelivered" name="bottlesDelivered" min="0" required>
          </div>

          <div class="form-group">
            <label for="bottlesReturned">Number of Bottles Returned:</label>
            <input type="number" id="bottlesReturned" name="bottlesReturned" min="0" required>
          </div>

          <div class="form-group">
            <label for="drNumber">DR Number:</label>
            <input type="text" id="drNumber" name="drNumber" required>
          </div>

          <button type="submit" class="btn btn-submit">Add Delivery</button>
        </form>
        <div id="formMessage" class="form-message"></div>
      </section>

      <section class="table-section">
        <div class="section-header">
          <h2>Delivery Records</h2>
          <button type="button" class="btn btn-backup" id="backupBtn" title="Create manual backup">💾 Backup</button>
        </div>
        <div class="table-wrapper">
          <table id="deliveriesTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Company</th>
                <th>Bottles Delivered</th>
                <th>Bottles Returned</th>
                <th>DR Number</th>
                <th>Timestamp</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr class="empty-state">
                <td colspan="7">No deliveries recorded yet</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="backupModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Backup Management</h2>
        <button type="button" class="modal-close" id="closeBackupModal">&times;</button>
      </div>
      <div class="backup-content">
        <h3>Available Backups</h3>
        <div id="backupList" class="backup-list">
          <p class="loading">Loading backups...</p>
        </div>
      </div>
      <div class="modal-buttons">
        <button type="button" class="btn btn-submit" id="manualBackupBtn">Create Backup Now</button>
        <button type="button" class="btn btn-cancel" id="closeBackupModal2">Close</button>
      </div>
    </div>
  </div>

  <div id="editModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Edit Delivery</h2>
        <button type="button" class="modal-close" id="closeModal">&times;</button>
      </div>
      <form id="editForm">
        <input type="hidden" id="editId">
        <div class="form-group">
          <label for="editCompany">Company Delivered:</label>
          <select id="editCompany" required>
            <option value="">-- Select a Company --</option>
          </select>
        </div>
        <div class="form-group">
          <label for="editBottlesDelivered">Number of Bottles Delivered:</label>
          <input type="number" id="editBottlesDelivered" min="0" required>
        </div>
        <div class="form-group">
          <label for="editBottlesReturned">Number of Bottles Returned:</label>
          <input type="number" id="editBottlesReturned" min="0" required>
        </div>
        <div class="form-group">
          <label for="editDrNumber">DR Number:</label>
          <input type="text" id="editDrNumber" required>
        </div>
        <div class="modal-buttons">
          <button type="button" class="btn btn-cancel" id="cancelEdit">Cancel</button>
          <button type="submit" class="btn btn-submit">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
